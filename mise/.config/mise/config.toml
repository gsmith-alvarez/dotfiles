[settings]
# Core settings
experimental = true
all_compile = false
activate_aggressive = true
env_shell_expand = true

# UI/UX
color_theme = "catppuccin"

[settings.npm]
package_manager = "bun"

[settings.pipx]
uvx = true

[tools]
# --- Core Runtimes ---
node = "latest"
bun = "latest"
zig = "latest"
watchexec = "latest"

# --- Language Servers (LSP) ---
lua-language-server = "latest"                     # Lua
"npm:bash-language-server" = "latest"              # Bash
"npm:pyright" = "latest"                           # Python
"npm:vscode-json-languageserver" = "latest"        # JSON
"npm:yaml-language-server" = "latest"              # YAML
"npm:dockerfile-language-server-nodejs" = "latest" # Docker

# --- Linters & Formatters ---
# General & Parsing
tree-sitter = "latest" # Incremental parsing library
ty = "latest"          # Typo checker (alternative)
typos = "latest"       # Source code spell checker

# Lua
stylua = "latest"

# Python
ruff = "latest"

# Shell (Bash/Fish)
shellcheck = "latest"
shfmt = "latest"

# JS/TS (Rust-powered tools)
oxlint = "latest"
oxfmt = "latest"

# Config Files
taplo = "latest"    # TOML
yamllint = "latest" # YAML

# --- Graphics & Typesetting ---
"npm:@mermaid-js/mermaid-cli" = "latest" # Diagrams
"cargo:tectonic" = "latest"              # LaTeX engine
fzf = "latest"
