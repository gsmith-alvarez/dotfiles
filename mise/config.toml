[settings]
# --- Mise Configuration ---
experimental = true
env_shell_expand = true
all_compile = false
activate_aggressive = true
color_theme = "catppuccin"

[settings.pipx]
uvx = true

[env]
# --- Global Environment ---
EDITOR = "nvim"
VISUAL = "nvim"
LANG = "en_US.UTF-8"

# Aider / LM Studio
OPENAI_API_BASE = "http://localhost:1234/v1"
OPENAI_API_KEY = "lm-studio"

# Path Safety Net
GOPATH = "{{env.HOME}}/.local/share/go"
PATH = "{{env.HOME}}/.local/share/go/bin:{{env.HOME}}/.cargo/bin:{{env.HOME}}/.local/bin:{{env.PATH}}"

