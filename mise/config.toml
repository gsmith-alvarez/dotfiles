[tasks."dotfiles:deploy"]
description = "Sync all configuration files using GNU Stow"
run = "stow --target {{env.HOME}}/.config ."

[tasks."cosmic:save"]
description = "Export current COSMIC desktop registry to dotfiles"
run = "dconf dump /org/cosmic/ > cosmic/cosmic_settings.dconf"

[tasks."cosmic:load"]
description = "Load COSMIC settings from dotfiles into the system"
run = "dconf load /org/cosmic/ < cosmic/cosmic_settings.dconf"

[tasks."nvim:test"]
description = "Run headless Neovim integration tests"
run = "cd nvim && just test"

[tasks."dotfiles:bootstrap"]
description = "Complete one-command setup for a fresh install"
depends = ["dotfiles:deploy"]
run = "mise install && fish -c list_all_apps"

[tasks.menu]
description = "Interactive menu to select and run mise tasks"
run = "mise tasks --columns name,description | tail -n +2 | fzf --header='Select task to run' | awk '{print $1}' | xargs mise run"

[tasks.start]
description = "Launch the primary development environment (Zellij + Nvim)"
run = "zellij --layout dev"

[tasks.audit]
description = "Audit dependencies for vulnerabilities across all managed ecosystems"
run = """
echo "--- Cargo Audit ---"
type -q cargo-deny; and cargo deny check; or echo "cargo-deny not installed"
echo "--- NPM Audit ---"
type -q npm; and npm audit; or echo "npm not installed"
"""

[tasks.doctor]
description = "Verify system health for development"
run = """
# Check udev rules for serial probes
ls /etc/udev/rules.d/60-serial-probes.rules >/dev/null 2>&1 && echo "✅ udev rules present" || echo "❌ MISSING: udev rules (/etc/udev/rules.d/60-serial-probes.rules)"
# Check group memberships
groups | grep -q dialout && echo "✅ dialout group membership" || echo "❌ MISSING: dialout group membership"
# Verify core binaries
mise which rustc >/dev/null 2>&1 && echo "✅ rust toolchain" || echo "❌ MISSING: rust toolchain"
mise which nvim >/dev/null 2>&1 && echo "✅ neovim" || echo "❌ MISSING: neovim"
"""
